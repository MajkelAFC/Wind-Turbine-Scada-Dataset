version: '3.8'

services:
  postgres_dw:
    image: postgres:15
    container_name: wind_postgres_dw
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: wind_energy_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
